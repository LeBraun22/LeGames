<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeGames — Browse</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .hero {
    padding: 64px 28px 40px;
    max-width: 1180px;
    margin: 0 auto;
  }
  .hero h1 {
    font-size: clamp(32px, 5vw, 52px);
    line-height: 1.05;
    margin: 18px 0 12px;
    max-width: 780px;
  }
  .hero h1 span { color: var(--accent); }
  .hero p { color: var(--text-dim); max-width: 560px; font-size: 16px; margin: 0 0 26px; }
  .hero-actions { display: flex; gap: 12px; }

  .section { max-width: 1180px; margin: 0 auto; padding: 10px 28px 80px; }
  .section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; }
  .section-head h2 { font-size: 20px; margin: 0; }
  .section-head .count { color: var(--text-dim); font-family: var(--mono); font-size: 13px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    overflow: hidden;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    transition: transform .15s ease, border-color .15s ease;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--accent-dim); }
  .thumb {
    height: 140px;
    position: relative;
    background:
      linear-gradient(180deg, rgba(79,209,255,.12), transparent 60%),
      repeating-linear-gradient(45deg, #171c29 0 12px, #141824 12px 24px);
  }
  .thumb .peak {
    position: absolute; bottom: 0; left: 0; right: 0; height: 60%;
    background: linear-gradient(180deg, transparent, var(--accent-dim) 220%);
    clip-path: polygon(0% 100%, 12% 55%, 24% 80%, 38% 40%, 52% 70%, 66% 30%, 80% 65%, 100% 45%, 100% 100%);
    opacity: .55;
  }
  .card-body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .card-body h3 { margin: 0; font-size: 16px; }
  .card-body p { margin: 0; font-size: 13px; color: var(--text-dim); line-height: 1.4; flex: 1; }
  .card-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .meta-stats { display: flex; gap: 10px; align-items: center; }
  .like-btn { background: none; padding: 0; font-family: var(--mono); font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 3px; }
  .like-btn.liked { color: var(--danger); }
  .live-badge { display: flex; align-items: center; gap: 4px; color: var(--ok); }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); animation: pulse 1.4s infinite; }
  @keyframes pulse { 50% { opacity: .3; } }
  .play-pill {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--accent); border: 1px solid var(--accent-dim); padding: 3px 8px; border-radius: 100px;
  }
  .empty { color: var(--text-dim); font-family: var(--mono); font-size: 14px; padding: 40px 0; }
</style>
</head>
<body class="dot-bg">
  <header class="topbar">
    <div class="logo"><span class="le">le</span><span class="games">games</span><span class="cursor">_</span></div>
    <div style="display:flex;align-items:center;gap:18px;">
      <nav class="nav-links">
        <a href="/" class="active">Browse</a>
        <a href="/studio.html">Studio</a>
        <a href="/studio.html?mine=1" id="myGamesLink" style="display:none;">My Games</a>
      </nav>
      <div id="authSlot"></div>
    </div>
  </header>

  <section class="hero">
    <span class="scanline-tag">alpha build</span>
    <h1>Build a world. <span>Ship it live.</span> Play it together.</h1>
    <p>LeGames is a browser-native game engine: sculpt terrain and place objects in Studio, publish in one click, and jump into real multiplayer sessions with anyone who has the link.</p>
    <div class="hero-actions">
      <a href="/studio.html"><button class="btn-primary">Open Studio</button></a>
      <a href="#games"><button class="btn-ghost">Browse games ↓</button></a>
    </div>
  </section>

  <section class="section" id="games">
    <div class="section-head">
      <h2>Published worlds</h2>
      <div style="display:flex;align-items:center;gap:14px;">
        <select id="sortSelect" style="font-size:12px;padding:6px 10px;">
          <option value="new">Newest</option>
          <option value="likes">Most liked</option>
          <option value="plays">Most played</option>
        </select>
        <span class="count" id="count">loading…</span>
      </div>
    </div>
    <div class="grid" id="grid"></div>
  </section>

  <script type="module">
    import { fetchMe, mountAuthWidget, onAuthChange, getUser, openAuthModal } from '/js/auth.js';

    mountAuthWidget(document.getElementById('authSlot'));
    const myGamesLink = document.getElementById('myGamesLink');
    onAuthChange(u => { myGamesLink.style.display = u ? 'inline-block' : 'none'; });
    fetchMe();

    let allGames = [];
    const sortSelect = document.getElementById('sortSelect');
    sortSelect.addEventListener('change', renderGrid);

    async function load() {
      const grid = document.getElementById('grid');
      const count = document.getElementById('count');
      try {
        const res = await fetch('/api/games');
        allGames = await res.json();
        count.textContent = allGames.length + (allGames.length === 1 ? ' game' : ' games');
        renderGrid();
      } catch (e) {
        count.textContent = '';
        grid.innerHTML = '<div class="empty">Could not reach the LeGames server. Is it running?</div>';
      }
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      if (allGames.length === 0) {
        grid.innerHTML = '<div class="empty">No games published yet. Open Studio and publish the first one.</div>';
        return;
      }
      const mode = sortSelect.value;
      const sorted = [...allGames].sort((a, b) => {
        if (mode === 'likes') return b.likeCount - a.likeCount;
        if (mode === 'plays') return (b.plays || 0) - (a.plays || 0);
        return b.createdAt - a.createdAt;
      });
      grid.innerHTML = sorted.map(g => `
        <div class="card" style="cursor:default;">
          <a href="/play.html?id=${g.id}" style="text-decoration:none;color:inherit;">
            <div class="thumb"><div class="peak"></div>
              ${g.livePlayers > 0 ? `<div class="live-badge" style="position:absolute;top:8px;right:8px;background:rgba(10,12,18,.7);padding:3px 8px;border-radius:100px;font-family:var(--mono);font-size:10px;"><span class="live-dot"></span>${g.livePlayers} playing</div>` : ''}
            </div>
            <div class="card-body">
              <h3>${escapeHtml(g.name)}</h3>
              <p>${escapeHtml(g.description || 'No description yet.')}</p>
            </div>
          </a>
          <div class="card-body" style="padding-top:0;">
            <div class="card-meta">
              <span>by ${escapeHtml(g.ownerName || 'Anonymous')}</span>
              <div class="meta-stats">
                <button class="like-btn ${g.liked ? 'liked' : ''}" data-id="${g.id}">${g.liked ? '♥' : '♡'} ${g.likeCount}</button>
                <span>▶ ${g.plays || 0}</span>
              </div>
            </div>
            <a href="/play.html?id=${g.id}"><span class="play-pill" style="display:inline-block;margin-top:8px;">Play ▶</span></a>
          </div>
        </div>
      `).join('');
      grid.querySelectorAll('.like-btn').forEach(btn => {
        btn.addEventListener('click', () => toggleLike(btn.dataset.id, btn));
      });
    }

    async function toggleLike(id, btn) {
      if (!getUser()) { openAuthModal('login', () => toggleLike(id, btn)); return; }
      const res = await fetch(`/api/games/${id}/like`, { method: 'POST' });
      if (!res.ok) return;
      const data = await res.json();
      const g = allGames.find(x => x.id === id);
      if (g) { g.likeCount = data.likeCount; g.liked = data.liked; }
      renderGrid();
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
    load();
  </script>
</body>
</html>
